<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial AI Analyst — ניתוח דוחות רבעוניים | דורון שרייבמן</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg: #f8fafc;
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--bg);
            color: var(--primary);
            min-height: 100vh;
        }
        
        .font-num { font-family: 'Inter', sans-serif; direction: ltr; unicode-bidi: isolate; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .prose-custom ul { list-style-type: disc; padding-right: 1.25rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .prose-custom li { margin-bottom: 0.25rem; }
        .prose-custom strong { color: #1e293b; font-weight: 700; }
        
        /* Section styling for narrative */
        .analysis-section {
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 12px;
            border-right: 4px solid;
            transition: all 0.2s;
        }
        .analysis-section:hover { transform: translateX(-2px); }
        .section-revenue { background: #f0fdf4; border-color: #22c55e; }
        .section-profit { background: #eff6ff; border-color: #3b82f6; }
        .section-eps { background: #faf5ff; border-color: #a855f7; }
        .section-deferred { background: #fff7ed; border-color: #f97316; }
        .section-ma { background: #fdf4ff; border-color: #d946ef; }
        .section-cash { background: #f0fdfa; border-color: #14b8a6; }
        .section-guidance { background: #fefce8; border-color: #eab308; }
        .section-general { background: #f8fafc; border-color: #94a3b8; }

        .section-title {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        /* Verification styles */
        .verification-panel {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
        }
        .verify-item-pass { background: #f0fdf4; border-right: 3px solid #22c55e; }
        .verify-item-warn { background: #fffbeb; border-right: 3px solid #f59e0b; }
        .verify-item-fail { background: #fef2f2; border-right: 3px solid #ef4444; }
        .verify-item-info { background: #f8fafc; border-right: 3px solid #94a3b8; }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
        }
        .pulse-green { animation: pulse-green 2s infinite; }

        .api-required-banner {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 1px solid #f59e0b;
        }

        /* Tooltip styles */
        .kpi-tooltip {
            position: relative;
            cursor: default;
        }
        .kpi-tooltip::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            right: 50%;
            transform: translateX(50%);
            background: #0f172a;
            color: #f8fafc;
            font-size: 11px;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
            z-index: 50;
            font-family: 'Assistant', sans-serif;
            direction: rtl;
        }
        .kpi-tooltip::before {
            content: '';
            position: absolute;
            bottom: calc(100% + 1px);
            right: 50%;
            transform: translateX(50%);
            border: 5px solid transparent;
            border-top-color: #0f172a;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
            z-index: 50;
        }
        .kpi-tooltip:hover::after,
        .kpi-tooltip:hover::before { opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // API key stored in memory (session only) — never persisted to disk
        let GEMINI_API_KEY = '';

        // ─── Section definitions for narrative parsing ────────────────────────────
        const SECTION_PATTERNS = [
            { key: 'revenue',   label: 'הכנסות וצמיחה',           className: 'section-revenue',  icon: '📈', keywords: ['revenue', 'הכנסות', 'צמיחה', 'product', 'subscription', 'שירותים'] },
            { key: 'profit',    label: 'רווחיות ומרווחים',         className: 'section-profit',   icon: '💹', keywords: ['margin', 'operating', 'gaap', 'non-gaap', 'רווח גולמי', 'מרווח תפעולי', 'profitability', 'רווחיות'] },
            { key: 'eps',       label: 'רווח למניה',               className: 'section-eps',      icon: '🔢', keywords: ['eps', 'diluted', 'net income', 'רווח נקי', 'per share'] },
            { key: 'deferred',  label: 'הכנסות נדחות ונראות עתידית', className: 'section-deferred', icon: '📊', keywords: ['deferred', 'rpo', 'backlog', 'נדחית', 'נראות'] },
            { key: 'ma',        label: 'רכישות ומוניטין',           className: 'section-ma',       icon: '🏛️', keywords: ['goodwill', 'acquisition', 'רכישה', 'm&a', 'מיזוג'] },
            { key: 'cash',      label: 'נזילות ותזרים',             className: 'section-cash',     icon: '💰', keywords: ['cash', 'fcf', 'liquidity', 'נזילות', 'תזרים', 'cfo', 'investments'] },
            { key: 'guidance',  label: 'תחזית קדימה',               className: 'section-guidance', icon: '🔭', keywords: ['guidance', 'outlook', 'forecast', 'תחזית', 'next quarter', 'fy2', 'expects'] },
        ];

        const parseAnalysisToSections = (analysisText) => {
            if (!analysisText) return [];
            
            // Normalize escaped newlines that may come from JSON parsing
            const normalized = analysisText
                .replace(/\\n\\n/g, '\n\n')
                .replace(/\\n/g, '\n');

            // Split by double newline
            const paragraphs = normalized
                .split(/\n{2,}/)
                .map(p => p.trim())
                .filter(p => p.length > 30);

            if (paragraphs.length <= 1) {
                // Try splitting by single newline
                const byLine = normalized
                    .split(/\n/)
                    .map(p => p.trim())
                    .filter(p => p.length > 30);
                
                if (byLine.length > 1) {
                    return byLine.map(p => assignSection(p));
                }

                // Last resort — split by sentences into groups of 3
                const sentences = normalized.match(/[^.!?]+[.!?]+/g) || [normalized];
                const chunks = [];
                let current = '';
                sentences.forEach((s, i) => {
                    current += s + ' ';
                    if ((i + 1) % 3 === 0 || i === sentences.length - 1) {
                        if (current.trim()) chunks.push(current.trim());
                        current = '';
                    }
                });
                return chunks.map(chunk => assignSection(chunk));
            }

            return paragraphs.map(p => assignSection(p));
        };

        const TITLE_TO_SECTION = {
            'תזרים ונזילות': { key: 'cash',     label: 'תזרים ונזילות',       className: 'section-cash',     icon: '💰' },
            'מנועי צמיחה':   { key: 'revenue',  label: 'מנועי צמיחה',         className: 'section-revenue',  icon: '📈' },
            'איכות הרווחיות':{ key: 'profit',   label: 'איכות הרווחיות',      className: 'section-profit',   icon: '💹' },
            'תחזית וטון ניהולי': { key: 'guidance', label: 'תחזית וטון ניהולי', className: 'section-guidance', icon: '🔭' },
            'סיכום השורה התחתונה': { key: 'general', label: 'סיכום השורה התחתונה', className: 'section-general', icon: '🎯' },
        };

        const assignSection = (text) => {
            // First: try to match the paragraph title at the start
            for (const [title, section] of Object.entries(TITLE_TO_SECTION)) {
                if (text.startsWith(title + ':') || text.startsWith(title + ' :')) {
                    return { ...section, text };
                }
            }
            // Fallback: keyword matching
            const lower = text.toLowerCase();
            for (const section of SECTION_PATTERNS) {
                if (section.keywords.some(kw => lower.includes(kw.toLowerCase()))) {
                    return { ...section, text };
                }
            }
            return { key: 'general', label: 'ניתוח', className: 'section-general', icon: '📝', text };
        };

        // ─── Verification Agent ───────────────────────────────────────────────────
        const runVerificationChecks = (metrics) => {
            const checks = [];
            const toNum = (v) => {
                if (v === null || v === undefined || v === '') return NaN;
                const s = String(v).trim().toUpperCase();
                const num = parseFloat(s.replace(/[^0-9.-]/g, ''));
                if (isNaN(num)) return NaN;
                if (s.includes('B')) return num * 1e9;
                if (s.includes('M')) return num * 1e6;
                return num;
            };

            // 1. Gross Margin range
            const gm = toNum(metrics.grossMargin);
            if (!isNaN(gm)) {
                if (gm >= 20 && gm <= 100) {
                    checks.push({ status: 'pass', label: 'Gross Margin', detail: `${gm}% — בטווח תקין` });
                } else if (gm >= 0 && gm < 20) {
                    checks.push({ status: 'warn', label: 'Gross Margin', detail: `${gm}% — נמוך, ייתכן לחץ על הרווחיות` });
                } else if (gm < 0 && gm >= -50) {
                    checks.push({ status: 'warn', label: 'Gross Margin', detail: `${gm}% — שלילי, אופייני לחברות בשלב צמיחה מוקדם` });
                } else if (gm < -50) {
                    checks.push({ status: 'fail', label: 'Gross Margin', detail: `${gm}% — שלילי חריג, בדוק ידנית` });
                } else {
                    checks.push({ status: 'fail', label: 'Gross Margin', detail: `${gm}% — מחוץ לטווח הגיוני` });
                }
            }

            // 2. FCF ≤ CFO
            const fcf = toNum(metrics.fcf);
            const cfo = toNum(metrics.cfo);
            if (!isNaN(fcf) && !isNaN(cfo) && cfo !== 0) {
                if (fcf <= cfo) {
                    checks.push({ status: 'pass', label: 'FCF vs CFO', detail: `FCF ≤ CFO — יחס תקין` });
                } else {
                    checks.push({ status: 'fail', label: 'FCF vs CFO', detail: `FCF (${metrics.fcf}) > CFO (${metrics.cfo}) — לא הגיוני, בדוק ידנית` });
                }
            }

            // 3. Non-GAAP EPS > GAAP EPS (almost always true)
            const gaapEps = toNum(metrics.eps);
            const ngEps = toNum(metrics.nonGaapEps);
            if (!isNaN(gaapEps) && !isNaN(ngEps)) {
                if (ngEps >= gaapEps) {
                    checks.push({ status: 'pass', label: 'Non-GAAP vs GAAP EPS', detail: `Non-GAAP EPS (${metrics.nonGaapEps}) ≥ GAAP EPS (${metrics.eps}) — תקין` });
                } else {
                    checks.push({ status: 'warn', label: 'Non-GAAP vs GAAP EPS', detail: `Non-GAAP EPS (${metrics.nonGaapEps}) < GAAP EPS (${metrics.eps}) — נדיר, בדוק` });
                }
            }

            // 4. Non-GAAP Margin > GAAP Margin
            const gaapOm = toNum(metrics.operatingMargin);
            const ngOm = toNum(metrics.nonGaapOperatingMargin);
            if (!isNaN(gaapOm) && !isNaN(ngOm)) {
                if (ngOm >= gaapOm) {
                    checks.push({ status: 'pass', label: 'Operating Margin', detail: `Non-GAAP (${ngOm}%) ≥ GAAP (${gaapOm}%) — תקין` });
                } else {
                    checks.push({ status: 'warn', label: 'Operating Margin', detail: `Non-GAAP (${ngOm}%) < GAAP (${gaapOm}%) — נדיר, בדוק ידנית` });
                }
            }

            // 5. Growth values sanity (not absurd)
            const revG = toNum(metrics.revGrowth);
            if (!isNaN(revG)) {
                if (Math.abs(revG) <= 200) {
                    checks.push({ status: 'pass', label: 'Revenue Growth', detail: `${revG}% — בטווח סביר` });
                } else {
                    checks.push({ status: 'warn', label: 'Revenue Growth', detail: `${revG}% — ערך קיצוני, בדוק ידנית` });
                }
            }

            // 6. EPS growth sanity
            const epsG = toNum(metrics.epsGrowth);
            const epsVal = toNum(metrics.eps);
            if (!isNaN(epsG)) {
                // Sign flip: current EPS positive, growth > 100% — this is a "turned profitable" case, not an error
                const isSignFlip = !isNaN(epsVal) && epsVal > 0 && epsG > 100;
                if (isSignFlip) {
                    checks.push({ status: 'pass', label: 'EPS Growth', detail: `מעבר מהפסד לרווח (${epsG}%) — תקין, base effect` });
                } else if (Math.abs(epsG) <= 500) {
                    checks.push({ status: 'pass', label: 'EPS Growth', detail: `${epsG}% — בטווח סביר` });
                } else if (Math.abs(epsG) <= 2000) {
                    checks.push({ status: 'warn', label: 'EPS Growth', detail: `${epsG}% — ערך קיצוני, ייתכן base effect או מעבר לרווחיות` });
                } else {
                    checks.push({ status: 'warn', label: 'EPS Growth', detail: `${epsG}% — בדוק ידנית, ייתכן שינוי מבני` });
                }
            }

            // 7. Cash > 0
            const cash = toNum(metrics.cash);
            if (!isNaN(cash)) {
                if (cash > 0) {
                    checks.push({ status: 'pass', label: 'Cash Position', detail: `${metrics.cash} — חיובי` });
                } else {
                    checks.push({ status: 'warn', label: 'Cash Position', detail: `ערך שלילי או אפס — בדוק` });
                }
            }

            // 8. Missing fields check
            const criticalFields = ['revenue', 'netIncome', 'eps', 'grossMargin', 'cfo'];
            const missing = criticalFields.filter(f => !metrics[f] || metrics[f] === '' || metrics[f] === '-');
            if (missing.length === 0) {
                checks.push({ status: 'pass', label: 'שלמות נתונים', detail: 'כל השדות הקריטיים מולאו' });
            } else {
                checks.push({ status: 'warn', label: 'שדות חסרים', detail: `חסר: ${missing.join(', ')}` });
            }

            return checks;
        };

        const Icons = {
            Upload: () => <svg className="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>,
            Trending: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
            File: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
            ArrowUp: () => <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 17L17 7m0 0H7m10 0v10" /></svg>,
            ArrowDown: () => <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 7L7 17m0 0h10m-10 0V7" /></svg>,
            Alert: () => <svg className="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Settings: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543-.94-3.31.826-2.37 2.37a1.724 1.724 0 00-1.065 2.572c-1.756.426-1.756 2.924 0 3.35a1.724 1.724 0 001.066 2.573c-.94 1.543.826 3.31 2.37 2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            Message: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
            Send: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>,
            Spinner: () => (
                <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            ),
            ChevronDown: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>,
            ChevronUp: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7" /></svg>,
            EyeOff: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" /></svg>,
            Key: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>,
            History: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Shield: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,

            CheckCircle: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
